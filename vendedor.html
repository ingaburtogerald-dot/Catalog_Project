<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Vendedor · Gyro Store</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');
    
    :root {
      --bg-900: #0f172a;
      --bg-800: #1e293b;
      --bg-700: #334155;
      --surface: #151b2c;
      --page: #0b0f19;
      --text: #e2e8f0;
      --text-soft: #aab2cf;
      --muted: #717a9c;
      --accent: #7c83ff;
      --accent-soft: #9aa0ff;

      /* Additional variables to support light mode */
      --border: rgba(255, 255, 255, 0.06);
      --border-strong: rgba(255, 255, 255, 0.12);
      --input-bg: #1e263d;
      --input-border: rgba(255, 255, 255, 0.12);
      --input-color: #fff;
      --btn-ghost-bg: #1e263d;
      --btn-ghost-hover: #2b3654;
      --btn-ghost-border: rgba(255, 255, 255, 0.08);
      --tr-hover: rgba(255, 255, 255, 0.02);
      --tr-border: rgba(255, 255, 255, 0.08);
      --heading-color: #fff;
      --modal-bg: #111827;
      --modal-border: rgba(255, 255, 255, 0.08);
      --scrollbar-thumb: #1e293b;
      --scrollbar-track: #ffffff;
    }

    body[data-theme="light"] {
      --bg-900: #cbd5e1;
      --bg-800: #e2e8f0;
      --bg-700: #94a3b8;
      --surface: #ffffff;
      --page: #f8fafc;
      --text: #0f172a;
      --text-soft: #334155;
      --muted: #64748b;
      --accent: #6366f1;
      --accent-soft: #818cf8;

      --border: rgba(15, 23, 42, 0.08);
      --border-strong: rgba(15, 23, 42, 0.15);
      --input-bg: #f1f5f9;
      --input-border: rgba(15, 23, 42, 0.15);
      --input-color: #0f172a;
      --btn-ghost-bg: #f1f5f9;
      --btn-ghost-hover: #e2e8f0;
      --btn-ghost-border: rgba(15, 23, 42, 0.1);
      --tr-hover: rgba(0, 0, 0, 0.02);
      --tr-border: rgba(15, 23, 42, 0.08);
      --heading-color: #0f172a;
      --modal-bg: #ffffff;
      --modal-border: rgba(15, 23, 42, 0.1);
      --scrollbar-thumb: #cbd5e1;
      --scrollbar-track: #f8fafc;
    }

    body {
      background: var(--page);
      color: var(--text);
      font-family: 'Outfit', 'Segoe UI', system-ui, sans-serif;
      transition: background 0.3s ease, color 0.3s ease;
    }
    
    .admin-wrap { max-width: 95%; margin: 0 auto; padding: var(--sp-6) var(--sp-5); }
    .admin-head { display: flex; flex-wrap: wrap; gap: var(--sp-4); align-items: center; justify-content: space-between; margin-bottom: var(--sp-5); }
    .admin-head h1 { font-size: 24px; color: var(--heading-color); }
    .user-box { display: flex; gap: var(--sp-3); align-items: center; font-size: 14px; }
    .user-box img { width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid var(--accent); }
    
    .panel {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: var(--sp-5);
      margin-bottom: var(--sp-5);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      transition: background 0.3s ease, border-color 0.3s ease;
    }
    .panel h2 { font-size: 18px; margin-bottom: var(--sp-4); color: var(--heading-color); }
    
    .grid-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: var(--sp-3); }
    .grid-form label { display: flex; flex-direction: column; gap: 4px; font-size: 13px; font-weight: 600; color: var(--text-soft); }
    
    .grid-form input, .grid-form select, .grid-form textarea {
      padding: 9px 12px;
      background: var(--input-bg);
      border: 1.5px solid var(--input-border);
      border-radius: var(--radius-sm);
      font: inherit;
      color: var(--input-color);
      transition: background 0.3s, border-color 0.3s, color 0.3s;
    }
    .grid-form input:focus, .grid-form select:focus, .grid-form textarea:focus {
      border-color: var(--accent);
      outline: none;
    }
    
    .form-actions { display: flex; gap: var(--sp-2); margin-top: var(--sp-3); }
    
    .btn-solid {
      padding: 10px 18px;
      border-radius: var(--radius-pill);
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent-soft));
      box-shadow: 0 4px 12px rgba(124, 131, 255, 0.25);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-solid:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(124, 131, 255, 0.35);
    }
    
    .btn-ghost {
      padding: 10px 18px;
      border-radius: var(--radius-pill);
      font-weight: 700;
      color: var(--text);
      background: var(--btn-ghost-bg);
      border: 1.5px solid var(--btn-ghost-border);
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }
    .btn-ghost:hover {
      background: var(--btn-ghost-hover);
    }
    
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { text-align: left; padding: 12px 14px; border-bottom: 1px solid var(--tr-border); vertical-align: middle; }
    th { font-size: 12px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); font-weight: 700; }
    tr:hover { background: var(--tr-hover); }
    
    .status-pill { display: inline-block; white-space: nowrap; padding: 4px 10px; border-radius: var(--radius-pill); font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
    .status-pending { background: rgba(245, 158, 11, 0.15); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.3); }
    .status-paid { background: rgba(59, 130, 246, 0.15); color: #3b82f6; border: 1px solid rgba(59, 130, 246, 0.3); }
    .status-delivered { background: rgba(16, 185, 129, 0.15); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }
    .status-cancelled { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
    
    .muted-note { color: var(--muted); font-size: 13px; }
    .tabs { display: flex; gap: var(--sp-2); margin-bottom: var(--sp-4); }
    
    .tab {
      padding: 8px 16px;
      border-radius: var(--radius-pill);
      font-weight: 600;
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--text-soft);
      transition: all 0.2s;
    }
    .tab:hover { color: var(--heading-color); border-color: var(--border-strong); }
    .tab.active { background: var(--accent); color: #fff; border-color: transparent; box-shadow: 0 4px 12px rgba(124, 131, 255, 0.25); }
    
    .hidden { display: none !important; }

    /* Pantalla de login */
    .login-screen { min-height: 80vh; display: grid; place-items: center; }

    /* Modal */
    .modal {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(5, 7, 15, 0.85);
      backdrop-filter: blur(8px);
      display: grid;
      place-items: center;
      padding: var(--sp-4);
    }
    .modal-content {
      background: var(--modal-bg);
      border: 1.5px solid var(--modal-border);
      border-radius: 16px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background 0.3s ease, border-color 0.3s ease;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 24px;
      border-bottom: 1px solid var(--modal-border);
    }
    .modal-header h2 { font-size: 18px; color: var(--heading-color); margin: 0; font-weight: 700; }
    .close-modal-btn { font-size: 20px; font-weight: 400; color: var(--text-soft); border: none; background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 50%; transition: background 0.2s, color 0.2s; }
    .close-modal-btn:hover { color: var(--heading-color); background: var(--tr-hover); }
    
    /* Modal Form Field overrides */
    .modal-content select {
      background: var(--input-bg) !important;
      border: 1px solid var(--input-border) !important;
      border-radius: 8px !important;
      padding: 10px 14px !important;
      color: var(--text) !important;
      font-size: 14px !important;
      font-family: inherit !important;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.3s;
    }
    .modal-content select:focus {
      border-color: var(--accent) !important;
      outline: none !important;
      box-shadow: 0 0 0 2px rgba(124, 131, 255, 0.15);
    }
    
    /* Custom Scrollbar */
    html {
      scrollbar-width: thin;
      scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-track);
    }
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: var(--scrollbar-track);
      border-radius: var(--radius-pill);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--scrollbar-thumb);
      border-radius: var(--radius-pill);
      border: 2px solid var(--scrollbar-track);
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--accent);
    }

    /* Spinner de Carga */
    .spinner {
      border: 4px solid var(--border-strong);
      border-left-color: var(--accent);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- ===== LOADING ===== -->
  <div class="login-screen" id="loading-view" style="display: grid; place-items: center; min-height: 80vh;">
    <div style="text-align: center;">
      <div class="spinner"></div>
      <p style="color: var(--text-soft); font-size: 16px; font-weight: 500;">Cargando sesión...</p>
    </div>
  </div>

  <!-- ===== PANEL ===== -->
  <div class="admin-wrap hidden" id="panel-view">
    <div class="admin-head">
      <div style="display: flex; align-items: center; gap: var(--sp-3);">
        <img src="assets/img/Gyro_Store_logo.jpeg" alt="Logo de Gyro Store" style="width: 48px; height: 48px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent);" />
        <div>
          <h1 style="font-size: 20px; font-weight: 800; display: flex; align-items: center; gap: 8px;">💼 Gyro Store - Portal de Vendedores <a href="/" style="font-size:13px;font-weight:600;color:var(--accent-soft); margin-left: 8px;">← Ver tienda</a></h1>
        </div>
      </div>
      <div class="user-box">
        <button class="btn-solid" id="btn-report-sale" style="border:none; cursor:pointer;">+ Reportar Venta</button>
        <img id="user-photo" alt="" />
        <span id="user-email"></span>
        <button class="hdr-action-btn" id="btn-settings" title="Configuración" style="font-size: 16px; padding: 8px; background: var(--btn-ghost-bg); border: 1.5px solid var(--btn-ghost-border); border-radius: 8px; cursor: pointer;">⚙️</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="orders">Pedidos</button>
      <button class="tab" data-tab="products">Productos</button>
    </div>

    <!-- Pedidos -->
    <section id="tab-orders">
      <div class="panel">
        <h2>Pedidos recientes</h2>
        <div style="overflow-x: auto;">
          <table id="orders-table">
            <thead>
              <tr>
                <th>Pedido</th>
                <th>Cliente</th>
                <th>Productos</th>
                <th>Total</th>
                <th>Estado</th>
                <th>Fecha</th>
              </tr>
            </thead>
            <tbody id="orders-tbody">
              <!-- Carga dinámica de pedidos -->
            </tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- Productos -->
    <section id="tab-products" class="hidden">
      <div class="panel">
        <h2>Catálogo de Productos (<span id="product-count">0</span>)</h2>
        <div style="overflow-x: auto;">
          <table>
            <thead>
              <tr>
                <th>Nombre</th>
                <th>Categoría</th>
                <th>Precio</th>
              </tr>
            </thead>
            <tbody id="products-tbody">
              <!-- Carga dinámica de productos -->
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </div>

  <!-- ===== MODAL CONFIGURACIÓN ===== -->
  <div id="settings-modal" class="modal hidden">
    <div class="modal-content" style="max-width: 400px;">
      <div class="modal-header">
        <h2>Configuración</h2>
        <button class="close-modal-btn" type="button" id="close-settings-modal-btn">&times;</button>
      </div>
      <form id="settings-form" style="padding: 24px;">
        <div class="grid-form" style="grid-template-columns: 1fr;">
          <label>Tema
            <select id="settings-theme" required>
              <option value="dark">Oscuro (Dark)</option>
              <option value="light">Claro (Light)</option>
            </select>
          </label>
        </div>
        <div style="margin-top: var(--sp-5); border-top: 1px solid var(--border); padding-top: var(--sp-4); display: flex; justify-content: space-between; align-items: center; gap: var(--sp-3);">
          <button type="button" class="btn-ghost del-btn" id="btn-logout" style="margin: 0; padding: 8px 16px; font-size: 13px; color: var(--danger); background: rgba(239, 68, 68, 0.15); border: none; cursor: pointer; font-weight: 700; border-radius: var(--radius-pill);">Cerrar Sesión</button>
          <div class="form-actions" style="margin: 0; justify-content: flex-end; gap: var(--sp-2);">
            <button type="button" class="btn-ghost" id="cancel-settings-btn" style="cursor: pointer;">Cancelar</button>
            <button type="submit" class="btn-solid" style="border: none; cursor: pointer;">Guardar</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <!-- ===== MODAL REPORTAR VENTA ===== -->
  <div id="report-modal" class="modal hidden">
    <div class="modal-content" style="max-width: 500px;">
      <div class="modal-header">
        <h2>Reportar Nueva Venta</h2>
        <button class="close-modal-btn" type="button" id="close-report-modal-btn">&times;</button>
      </div>
      <form id="report-form" style="padding: 24px;">
        <div id="report-items-container" style="display: flex; flex-direction: column; gap: 16px;">
          <!-- Items dinámicos -->
        </div>
        <button type="button" id="btn-add-report-item" class="btn-ghost" style="margin-top: 16px; width: 100%; border: 1.5px dashed var(--btn-ghost-border); background: transparent;">+ Añadir otro producto</button>
        
        <div style="margin-top: 24px; padding: 16px; background: rgba(124, 131, 255, 0.05); border-radius: 8px; border: 1px solid rgba(124, 131, 255, 0.2);">
          <div style="display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; color: var(--text-soft);">
            <span>Subtotal Venta:</span>
            <strong id="report-subtotal" style="color: var(--heading-color);">C$0.00</strong>
          </div>
          <div style="display: flex; justify-content: space-between; font-size: 15px; font-weight: bold; color: var(--accent);">
            <span>Comisión Estimada:</span>
            <strong id="report-commission">Calculando...</strong>
          </div>
        </div>

        <div style="margin-top: var(--sp-5); border-top: 1px solid var(--border); padding-top: var(--sp-4); display: flex; justify-content: flex-end; gap: var(--sp-2);">
          <button type="button" class="btn-ghost" id="cancel-report-btn" style="cursor: pointer;">Cancelar</button>
          <button type="submit" class="btn-solid" id="submit-report-btn" style="border: none; cursor: pointer;">Enviar Reporte</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>

  <script type="module" src="assets/js/vendedor.js"></script>
  <script src="assets/js/auth-global.js"></script>
</body>
</html>
